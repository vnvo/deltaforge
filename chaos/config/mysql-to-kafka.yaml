apiVersion: deltaforge/v1
kind: Pipeline
metadata:
  name: chaos-mysql
  tenant: chaos

spec:
  source:
    type: mysql
    config:
      id: chaos-mysql
      dsn: "mysql://cdc_user:cdc_password@toxiproxy:5100/orders"
      tables:
        - "orders.*"
      on_schema_drift: adapt

  processors: []

  sinks:
    - type: kafka
      config:
        id: chaos-kafka
        brokers: "toxiproxy:5102"
        topic: chaos.cdc
        required: true
        send_timeout_secs: 3

  batch:
    max_events: 50
    max_ms: 500
    respect_source_tx: true

  commit_policy:
    mode: required