apiVersion: deltaforge/v1
kind: Pipeline
metadata:
  name: chaos-mysql
  tenant: chaos

spec:
  source:
    type: mysql
    config:
      id: chaos-mysql
      host: toxiproxy
      port: 5100
      username: cdc_user
      password: cdc_password
      database: orders
      tables: ["orders.*"]
      server_id: 201
      on_schema_drift: adapt

  sinks:
    - type: kafka
      config:
        id: chaos-kafka
        brokers: "toxiproxy:5102"
        topic: chaos.cdc
        required: true
        send_timeout_secs: 10

  batch:
    max_events: 50
    max_ms: 500
    respect_source_tx: true

  commit_policy:
    mode: required

  storage:
    backend: sqlite
    path: /data/chaos.db
