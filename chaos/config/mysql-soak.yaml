apiVersion: deltaforge/v1
kind: Pipeline
metadata:
  name: chaos-soak
  tenant: chaos

spec:
  source:
    type: mysql
    config:
      id: chaos-soak-mysql
      dsn: "mysql://cdc_user:cdc_password@toxiproxy:5100/orders"
      tables:
        - "orders.*"
      on_schema_drift: adapt

  processors: []

  sinks:
    - type: kafka
      config:
        id: chaos-soak-kafka
        brokers: "toxiproxy:5102"
        topic: chaos.soak
        required: true
        send_timeout_secs: 5

  batch:
    max_events: 200
    max_ms: 200
    respect_source_tx: false

  commit_policy:
    mode: required
