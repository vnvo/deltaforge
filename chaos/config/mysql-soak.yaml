apiVersion: deltaforge/v1
kind: Pipeline
metadata:
  name: chaos-soak
  tenant: chaos

spec:
  source:
    type: mysql
    config:
      id: chaos-soak-mysql
      dsn: "mysql://cdc_user:cdc_password@toxiproxy:5100/orders"
      tables:
        - "orders.*"
      on_schema_drift: adapt

  schema_sensing:
    enabled: true
    sampling:
      warmup_events: 100    # default 1000 — reach steady state faster across 120 tables
      sample_rate: 50       # default 10 — sense 2% of events post-warmup
      structure_cache: true
    deep_inspect:
      enabled: true
      max_depth: 3          # default 10 — soak tables have no deeply nested JSON
      max_sample_size: 100  # default 1000
    tracking:
      field_statistics: false
      null_rates: false     # skip per-field null tracking
      enum_detection: false # soak tables use simple scalar values

  processors: []

  sinks:
    - type: kafka
      config:
        id: chaos-soak-kafka
        brokers: "toxiproxy:5102"
        topic: chaos.soak
        required: true
        send_timeout_secs: 5

  batch:
    max_events: 2000
    max_ms: 50
    respect_source_tx: false

  commit_policy:
    mode: required
