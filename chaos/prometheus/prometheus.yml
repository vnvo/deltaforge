global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: deltaforge
    static_configs:
      - targets: ["deltaforge:9000", "deltaforge-pg:9000", "deltaforge-soak:9000", "deltaforge-tpcc:9000"]
    metrics_path: /metrics

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    metrics_path: /metrics
