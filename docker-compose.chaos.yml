# Chaos testing environment for DeltaForge
#
# Network topology:
#   DeltaForge -> toxiproxy -> mysql / postgres / kafka
#
# Profiles — infra and app are independent so you can start/stop DeltaForge
# containers without affecting the underlying infrastructure:
#
#   base          — toxiproxy, prometheus, grafana, cadvisor, loki, promtail
#   mysql-infra   — mysql, mysql-b
#   pg-infra      — postgres, postgres-b
#   kafka-infra   — kafka
#   app           — DeltaForge MySQL->Kafka chaos instance
#   pg-app        — DeltaForge Postgres->Kafka chaos instance
#   soak          — DeltaForge MySQL soak/drain benchmark
#   pg-soak       — DeltaForge Postgres soak/drain benchmark
#   tpcc          — DeltaForge MySQL TPC-C benchmark
#
# Usage:
#   # Start everything for MySQL chaos testing
#   docker compose -f docker-compose.chaos.yml \
#     --profile base --profile mysql-infra --profile kafka-infra --profile app up -d
#
#   # Restart only the DeltaForge container (infra stays up)
#   docker compose -f docker-compose.chaos.yml --profile app restart
#
#   # Add Postgres infra + pg-soak without touching anything else
#   docker compose -f docker-compose.chaos.yml --profile pg-infra --profile pg-soak up -d
#
#   # View all container logs in Grafana Explore (Loki datasource)
#   open http://localhost:3000/explore
#     Query: {service="deltaforge-soak"} or {container=~"deltaforge.*"}

services:

  # ==========================================================================
  # mysql-infra — MySQL primary + failover replica
  # ==========================================================================

  mysql:
    image: mysql:8.4
    profiles: [mysql-infra]
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - ./chaos/init/mysql-chaos.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./chaos/init/mysql-soak.sql:/docker-entrypoint-initdb.d/02_soak.sql
      - ./chaos/init/mysql-tpcc.sql:/docker-entrypoint-initdb.d/03_tpcc.sql
      - mysql_data:/var/lib/mysql
    command:
      - --server-id=101
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-checksum=NONE
      # 1 hour retention — long enough for large drain benchmarks (10M+ rows)
      - --binlog-expire-logs-seconds=3600
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 15
    ports:
      - "3306:3306"
    networks: [chaos_net]

  mysql-b:
    image: mysql:8.4
    profiles: [mysql-infra]
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - ./chaos/init/mysql-chaos.sql:/docker-entrypoint-initdb.d/01_init.sql
      - mysql_b_data:/var/lib/mysql
    command:
      - --server-id=102
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-checksum=NONE
      - --binlog-expire-logs-seconds=3600
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [chaos_net]

  # ==========================================================================
  # pg-infra — PostgreSQL primary + failover replica
  # ==========================================================================

  postgres:
    image: postgres:17
    profiles: [pg-infra]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    volumes:
      - ./chaos/init/postgres-chaos.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./chaos/init/postgres-soak.sql:/docker-entrypoint-initdb.d/02_soak.sql
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      # Short WAL retention so slot_dropped scenario triggers quickly
      - -c
      - wal_keep_size=8MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks: [chaos_net]

  postgres-b:
    image: postgres:17
    profiles: [pg-infra]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    volumes:
      - ./chaos/init/postgres-chaos.sql:/docker-entrypoint-initdb.d/01_init.sql
      - postgres_b_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [chaos_net]

  # ==========================================================================
  # kafka-infra — Kafka broker (KRaft, no Zookeeper)
  # ==========================================================================

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    profiles: [kafka-infra]
    environment:
      # KRaft mode — combined broker + controller in a single node
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # Listeners: CONTROLLER for KRaft consensus, BROKER for inter-broker,
      # CLIENT for toxiproxy routing, EXTERNAL for host access
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093,BROKER://0.0.0.0:29092,CLIENT://0.0.0.0:9094,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka:29092,CLIENT://toxiproxy:5102,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Keep topics lean: 5 min retention, 1 min segments so cleanup fires quickly
      KAFKA_LOG_RETENTION_MS: "300000"
      KAFKA_LOG_SEGMENT_MS: "60000"
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "30000"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - "9092:9092"
    networks: [chaos_net]

  # ==========================================================================
  # base — proxy, observability, log aggregation
  # ==========================================================================

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    profiles: [base]
    command: ["-host=0.0.0.0", "-config=/etc/toxiproxy/proxies.json"]
    volumes:
      - ./chaos/toxiproxy/proxies.json:/etc/toxiproxy/proxies.json:ro
    ports:
      - "8474:8474"   # Toxiproxy API  <-- scenario runner talks here
      - "5100:5100"   # mysql proxy    <-- also exposed for ad-hoc inspection
      - "5101:5101"   # postgres proxy
      - "5102:5102"   # kafka proxy
    # No depends_on — infra profiles start independently. Toxiproxy retries
    # upstream connections automatically; backends just need to be up before
    # DeltaForge connects through the proxy.
    networks: [chaos_net]

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [base]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./chaos/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    networks: [chaos_net]

  loki:
    image: grafana/loki:3.0.0
    profiles: [base]
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./chaos/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports: ["3100:3100"]
    networks: [chaos_net]

  promtail:
    image: grafana/promtail:3.0.0
    profiles: [base]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./chaos/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks: [chaos_net]

  grafana:
    image: grafana/grafana:11.1.0
    profiles: [base]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/deltaforge.json
    volumes:
      - ./chaos/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./chaos/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports: ["3000:3000"]
    networks: [chaos_net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    profiles: [base]
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports: ["8888:8080"]
    networks: [chaos_net]

  # ==========================================================================
  # DeltaForge app instances
  # ==========================================================================

  # MySQL -> Kafka chaos instance (debug image for kill -9 tests)
  deltaforge:
    image: deltaforge:dev-debug
    profiles: [app]
    command: ["--config", "/etc/deltaforge/mysql-to-kafka.yaml", "--storage-path", "/data/deltaforge.db"]
    user: root
    volumes:
      - ./chaos/config:/etc/deltaforge:ro
      - deltaforge_data:/data
    environment:
      RUST_LOG: "deltaforge=debug,sources=debug,sinks=info,warn"
    ports:
      - "8080:8080"   # REST API / health
      - "9000:9000"   # Prometheus /metrics
    # restart: on-failure is intentional — crash-recovery scenario needs this
    restart: on-failure
    networks: [chaos_net]

  # Postgres -> Kafka chaos instance
  # Same host ports as deltaforge (8080, 9000) — don't run app + pg-app together
  deltaforge-pg:
    image: deltaforge:dev-debug
    profiles: [pg-app]
    command: ["--config", "/etc/deltaforge/pg-to-kafka.yaml", "--storage-path", "/data/deltaforge-pg.db"]
    user: root
    volumes:
      - ./chaos/config:/etc/deltaforge:ro
      - deltaforge_pg_data:/data
    environment:
      RUST_LOG: "deltaforge=debug,sources=debug,sinks=info,warn"
    ports:
      - "8080:8080"   # REST API / health
      - "9000:9000"   # Prometheus /metrics
    restart: on-failure
    networks: [chaos_net]

  # MySQL TPC-C benchmark (ports 8082/9002)
  deltaforge-tpcc:
    image: deltaforge:dev-debug
    profiles: [tpcc]
    command: ["--config", "/etc/deltaforge/mysql-tpcc.yaml", "--storage-path", "/data/deltaforge-tpcc.db"]
    user: root
    volumes:
      - ./chaos/config:/etc/deltaforge:ro
      - deltaforge_tpcc_data:/data
    environment:
      RUST_LOG: "deltaforge=info,sources=info,sinks=info,warn"
    ports:
      - "8082:8080"   # REST API / health
      - "9002:9000"   # Prometheus /metrics
    restart: on-failure
    networks: [chaos_net]

  # MySQL soak/drain benchmark (profiling image, ports 8081/9001)
  deltaforge-soak:
    image: deltaforge:dev-profile
    profiles: [soak]
    command: ["--config", "/etc/deltaforge/mysql-soak.yaml", "--storage-path", "/data/deltaforge-soak.db"]
    user: root
    # SYS_ADMIN + perf_event_open access needed for CPU profiling via perf.
    # Only effective when running the profiling image; harmless with dev-debug.
    cap_add: [SYS_ADMIN]
    security_opt: ["seccomp=unconfined"]
    volumes:
      - ./chaos/config:/etc/deltaforge:ro
      - deltaforge_soak_data:/data
    environment:
      RUST_LOG: "deltaforge=info,sources=info,sinks=info,warn"
    ports:
      - "8081:8080"   # REST API / health
      - "9001:9000"   # Prometheus /metrics
    restart: on-failure
    networks: [chaos_net]

  # Postgres soak/drain benchmark (profiling image, ports 8083/9003)
  deltaforge-pg-soak:
    image: deltaforge:dev-profile
    profiles: [pg-soak]
    command: ["--config", "/etc/deltaforge/pg-soak.yaml", "--storage-path", "/data/deltaforge-pg-soak.db"]
    user: root
    cap_add: [SYS_ADMIN]
    security_opt: ["seccomp=unconfined"]
    volumes:
      - ./chaos/config:/etc/deltaforge:ro
      - deltaforge_pg_soak_data:/data
    environment:
      RUST_LOG: "deltaforge=info,sources=info,sinks=info,warn"
    ports:
      - "8083:8080"   # REST API / health
      - "9003:9000"   # Prometheus /metrics
    restart: on-failure
    networks: [chaos_net]

networks:
  chaos_net:

volumes:
  deltaforge_data:
  deltaforge_pg_data:
  deltaforge_tpcc_data:
  deltaforge_soak_data:
  deltaforge_pg_soak_data:
  grafana_data:
  loki_data:
  mysql_data:
  mysql_b_data:
  postgres_data:
  postgres_b_data:
