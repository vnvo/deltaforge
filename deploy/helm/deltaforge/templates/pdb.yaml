{{- if gt (int .Values.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "deltaforge.fullname" . }}
  labels:
    {{- include "deltaforge.labels" . | nindent 4 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "deltaforge.selectorLabels" . | nindent 6 }}
{{- end }}
